suite: ClusterRole test
templates:
  - clusterrole.yaml
release:
  name: test-k8s-node-dns
  namespace: test-ns

tests:
  - it: should render ClusterRole with correct name and without namespace
    asserts:
      - hasDocuments:
          count: 1
      - isAPIVersion:
          of: rbac.authorization.k8s.io/v1
      - isKind:
          of: ClusterRole
      - equal:
          path: metadata.name
          value: test-k8s-node-dns
      - notExists:
          path: metadata.namespace

  - it: should grant get/list/watch on nodes resource
    asserts:
      - equal:
          path: rules
          value:
            - apiGroups:
                - ""
              resources:
                - nodes
              verbs:
                - get
                - list
                - watch

  - it: should have the standard chart labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: k8s-node-dns
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: k8s-node-dns
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: test-k8s-node-dns
