suite: ServiceAccount
templates:
  - serviceaccount.yaml
release:
  name: k8s-node-dns
  namespace: test-ns

tests:
  - it: should render ServiceAccount with correct name and namespace
    release:
      namespace: custom-ns
    asserts:
      - hasDocuments:
          count: 1
      - isAPIVersion:
          of: v1
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: k8s-node-dns
      - equal:
          path: metadata.namespace
          value: custom-ns

  - it: should use fullnameOverride if set
    set:
      fullnameOverride: test123
    asserts:
      - equal:
          path: metadata.name
          value: test123

  - it: should have the standard chart labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: k8s-node-dns
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: k8s-node-dns
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: k8s-node-dns
