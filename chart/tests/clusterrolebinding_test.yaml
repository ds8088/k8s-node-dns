suite: ClusterRoleBinding
templates:
  - clusterrolebinding.yaml
release:
  name: k8s-node-dns
  namespace: test-ns

tests:
  - it: should render ClusterRoleBinding with correct name and without namespace
    asserts:
      - hasDocuments:
          count: 1
      - isAPIVersion:
          of: rbac.authorization.k8s.io/v1
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: metadata.name
          value: k8s-node-dns
      - notExists:
          path: metadata.namespace

  - it: should have correct roleRef
    asserts:
      - equal:
          path: roleRef.apiGroup
          value: rbac.authorization.k8s.io
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - equal:
          path: roleRef.name
          value: k8s-node-dns

  - it: should bind subject to the ServiceAccount
    asserts:
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - equal:
          path: subjects[0].name
          value: k8s-node-dns

  - it: should have the standard chart labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: k8s-node-dns
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: k8s-node-dns
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: k8s-node-dns
