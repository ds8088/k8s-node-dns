suite: Deployment
templates:
  - deployment.yaml
release:
  name: k8s-node-dns
  namespace: test-ns
set:
  config.zone: lb.pootis.network
  config.soaNS: ns1.lb.pootis.network:1.2.3.4;ns2.lb.pootis.network:1.2.3.5
  config.soaEmail: admin@pootis.network

tests:
  - it: should render Deployment with correct name and namespace
    asserts:
      - hasDocuments:
          count: 1
      - isAPIVersion:
          of: apps/v1
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: k8s-node-dns
      - equal:
          path: metadata.namespace
          value: test-ns

  - it: should render with custom namespace if it is set
    release:
      namespace: custom-ns
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-ns

  - it: should use selector labels
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: k8s-node-dns
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: k8s-node-dns
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: k8s-node-dns
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/instance"]
          value: k8s-node-dns

  - it: should set custom serviceAccountName
    set:
      serviceAccount:
        name: test-account
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: test-account

  - it: should set hostUsers to false
    asserts:
      - equal:
          path: spec.template.spec.hostUsers
          value: false

  - it: should omit hostUsers field if set to null
    set:
      hostUsers: null
    asserts:
      - notExists:
          path: spec.template.spec.hostUsers

  - it: should set nodeSelector on pods if provided
    set:
      nodeSelector:
        k8s.pootis.network/is-cloud-node: "true"
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector["k8s.pootis.network/is-cloud-node"]
          value: "true"

  - it: should render container with correct name, image and tag
    set:
      image:
        repository: ghcr.io/ds8088/k8s-node-dns-dev
        tag: 1.2.3
        pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: k8s-node-dns
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/ds8088/k8s-node-dns-dev:1.2.3
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: should pass config to container arguments
    set:
      config.zone: dns.example.com
      config.soaNS: ns1.example.com;ns2.example.com
      config.soaEmail: admin@example.com
      config.port: 54
      config.ttl: 1000
      config.areasAnnotation: example.com/areas
      config.ipsAnnotation: example.com/ips
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --zone=dns.example.com
      - contains:
          path: spec.template.spec.containers[0].args
          content: --soa-ns=ns1.example.com;ns2.example.com
      - contains:
          path: spec.template.spec.containers[0].args
          content: --soa-email=admin@example.com
      - contains:
          path: spec.template.spec.containers[0].args
          content: --port=54
      - contains:
          path: spec.template.spec.containers[0].args
          content: --ttl=1000
      - contains:
          path: spec.template.spec.containers[0].args
          content: --areas-annotation=example.com/areas
      - contains:
          path: spec.template.spec.containers[0].args
          content: --ips-annotation=example.com/ips

  - it: should set custom capabilities in container security context
    asserts:
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.add
          content: NET_BIND_SERVICE

  - it: should not set resources by default
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].resources

  - it: should set resources when provided
    set:
      resources.requests.cpu: 100m
      resources.limits.memory: 200Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 200Mi
