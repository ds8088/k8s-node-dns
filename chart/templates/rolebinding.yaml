{{- if .Values.config.leaderElect }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "k8s-node-dns.roleName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-node-dns.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "k8s-node-dns.roleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-node-dns.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
