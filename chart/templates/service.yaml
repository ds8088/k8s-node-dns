apiVersion: v1
kind: Service
metadata:
  name: {{ default (include "k8s-node-dns.fullname" .) .Values.service.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-node-dns.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "k8s-node-dns.selectorLabels" . | nindent 4 }}

  {{- if .Values.service.ipFamilyPolicy }}
  ipFamilyPolicy: {{ .Values.service.ipFamilyPolicy }}
  {{- end }}

  {{- if .Values.service.clusterIP }}
  clusterIP: {{ .Values.service.clusterIP }}
  {{- end }}

  {{- if .Values.service.clusterIPs }}
  clusterIPs:
    {{- toYaml .Values.service.clusterIPs | nindent 4 }}
  {{- end }}

  ports:
    - name: dns-udp
      port: {{ .Values.service.port }}
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: {{ .Values.service.port }}
      targetPort: dns-tcp
      protocol: TCP
